
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SereneFocus - Controls</title>
  <link rel="stylesheet" href="setup.css">
</head>
<body>
  <section>
    <h1>SereneFocus</h1>
    <h2>Controls</h2>
<div class="timer-controls">
  
  <div class="timer-option">
    <button class="minus-btn"> 
      <img src="minus.svg" alt="minus">
    </button>
    <span class="timer-view">25 mins</span>
    <button class="plus-btn"> 
      <img src="plus.svg" alt="plus">
    </button>
</div>


<div class="break-option">

<button class="minus-btn"> 
  <img src="minus.svg" alt="minus">
</button>
    <span class="timer-view">Break</span>
<button class="plus-btn"> 
  <img src="plus.svg" alt="plus">
</button>
</div>


</div>
</div>
    <button class="start-btn">Start</button>
  </section>

<script src="index.js"></script>
</body>
</html>
